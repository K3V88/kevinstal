    description: >
        Mijn naam is Kevin Stal. Ik ben geboren en getogen in Ermelo, Nederland, en ben tweetalig opgegroeid met Nederlands en Duits. Al op jonge leeftijd ontwikkelde ik een sterke affiniteit met talen en verschillende culturen, wat sterk heeft bijgedragen aan mijn manier van denken en communiceren.
        <br><br>
        Van jongs af aan ben ik al gefascineerd door hoe programmeertalen gebruikt kunnen worden om van eenvoudige ideeën echte, werkende producten te maken.
        <br><br>
        Na mijn studie International Business en Languages in Nederland ben ik naar Zwitserland verhuisd, waar ik professionele ervaring heb opgedaan in de luchtvaartindustrie voordat ik de overstap maakte naar programmeren. Vandaag de dag ben ik een gepassioneerde Ruby on Rails-ontwikkelaar die zich richt op het bouwen van strakke, schaalbare en onderhoudbare webapplicaties.

